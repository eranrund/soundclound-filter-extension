<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#ff5500"/>

  <!-- Equalizer bars (left to right, varying heights, centered vertically) -->
  <!-- Bar 1 (short) -->
  <rect x="18" y="72" width="16" height="38" rx="4" fill="white" opacity="0.4"/>
  <!-- Bar 2 (tall - filtered) -->
  <rect x="42" y="28" width="16" height="82" rx="4" fill="white" opacity="0.4"/>
  <!-- Bar 3 (medium) -->
  <rect x="66" y="52" width="16" height="58" rx="4" fill="white" opacity="0.4"/>
  <!-- Bar 4 (tall - filtered) -->
  <rect x="90" y="20" width="16" height="90" rx="4" fill="white" opacity="0.4"/>

  <!-- Bars above threshold line (full white = playing / visible) -->
  <rect x="18" y="72" width="16" height="38" rx="4" fill="white"/>
  <rect x="66" y="52" width="16" height="58" rx="4" fill="white"/>

  <!-- Threshold line -->
  <line x1="10" y1="62" x2="118" y2="62" stroke="white" stroke-width="5" stroke-linecap="round" stroke-dasharray="8 4"/>
</svg>
